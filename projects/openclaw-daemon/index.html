<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Web UI v1.1 - 增强监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header .version {
            font-size: 0.9em;
            color: #888;
            margin-top: 10px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        .tab {
            padding: 10px 20px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: #3a3a3a;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        
        .stat-card h3 {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .section {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        
        .section h2 {
            margin-bottom: 20px;
            color: #667eea;
        }
        
        .agent-list {
            display: grid;
            gap: 15px;
        }
        
        .agent-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        
        .agent-card .agent-id {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .agent-card .agent-info {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .agent-card .state {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        .agent-card .state.running {
            background: #10b981;
            color: white;
        }
        
        .agent-card .state.stopped {
            background: #ef4444;
            color: white;
        }
        
        .agent-card .state.error {
            background: #f59e0b;
            color: white;
        }
        
        .agent-card .metrics {
            font-size: 0.9em;
            color: #888;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
        }
        
        .refresh-btn:hover {
            background: #764ba2;
        }
        
        /* 任务看板样式（新增） */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .kanban-column {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        
        .kanban-column h3 {
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .kanban-card {
            background: #2a2a2a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        
        .kanban-card .title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .kanban-card .priority {
            font-size: 0.8em;
            padding: 2px 8px;
            border-radius: 3px;
            display: inline-block;
        }
        
        .kanban-card .priority.urgent {
            background: #ef4444;
            color: white;
        }
        
        .kanban-card .priority.high {
            background: #f59e0b;
            color: white;
        }
        
        .kanban-card .priority.normal {
            background: #10b981;
            color: white;
        }
        
        /* 性能图表样式（新增） */
        .chart-container {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        
        .chart-bars {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .chart-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-bar .label {
            width: 150px;
            font-size: 0.9em;
        }
        
        .chart-bar .bar {
            flex: 1;
            height: 25px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .chart-bar .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        
        .chart-bar .value {
            width: 80px;
            text-align: right;
            font-size: 0.9em;
        }
        
        /* 日志流样式（新增） */
        .log-stream {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #222;
        }
        
        .log-entry .timestamp {
            color: #888;
            margin-right: 10px;
        }
        
        .log-entry .level {
            margin-right: 10px;
        }
        
        .log-entry .level.INFO {
            color: #10b981;
        }
        
        .log-entry .level.WARNING {
            color: #f59e0b;
        }
        
        .log-entry .level.ERROR {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 OpenClaw Web UI v1.1</h1>
            <p class="version">增强监控版 - 任务看板 + 性能图表 + 实时日志</p>
        </div>
        
        <!-- 标签页导航 -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('overview')">总览</div>
            <div class="tab" onclick="switchTab('tasks')">任务看板</div>
            <div class="tab" onclick="switchTab('performance')">性能监控</div>
            <div class="tab" onclick="switchTab('logs')">实时日志</div>
        </div>
        
        <!-- 总览标签页 -->
        <div id="overview" class="tab-content active">
            <!-- 统计卡片 -->
            <div class="stats" id="stats">
                <div class="stat-card">
                    <h3>总频道数</h3>
                    <div class="value" id="total-channels">-</div>
                </div>
                <div class="stat-card">
                    <h3>总线程数</h3>
                    <div class="value" id="total-threads">-</div>
                </div>
                <div class="stat-card">
                    <h3>运行中的 Agent</h3>
                    <div class="value" id="running-agents">-</div>
                </div>
                <div class="stat-card">
                    <h3>总 Agent 数</h3>
                    <div class="value" id="total-agents">-</div>
                </div>
                <div class="stat-card">
                    <h3>待处理任务</h3>
                    <div class="value" id="pending-tasks">-</div>
                </div>
                <div class="stat-card">
                    <h3>已完成任务</h3>
                    <div class="value" id="completed-tasks">-</div>
                </div>
            </div>
            
            <!-- Agent 状态 -->
            <div class="section">
                <h2>🤖 Agent 状态</h2>
                <div class="agent-list" id="agents">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
        
        <!-- 任务看板标签页 -->
        <div id="tasks" class="tab-content">
            <div class="section">
                <h2>📋 任务看板</h2>
                <div class="kanban-board" id="kanban-board">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
        
        <!-- 性能监控标签页 -->
        <div id="performance" class="tab-content">
            <div class="section">
                <h2>📊 性能监控</h2>
                <div class="chart-container">
                    <h3>Agent 启动时间</h3>
                    <div class="chart-bars" id="spawn-time-chart">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                <div class="chart-container">
                    <h3>Agent 重启次数</h3>
                    <div class="chart-bars" id="restart-chart">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 实时日志标签页 -->
        <div id="logs" class="tab-content">
            <div class="section">
                <h2>📜 实时日志</h2>
                <div class="log-stream" id="log-stream">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
        
        <!-- 刷新按钮 -->
        <div style="text-align: center;">
            <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
        </div>
    </div>
    
    <script>
        // API 基础 URL
        const API_BASE = 'http://localhost:8080/api';
        
        // 标签页切换
        function switchTab(tabName) {
            // 隐藏所有标签页
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 取消所有标签的激活状态
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的标签页
            document.getElementById(tabName).classList.add('active');
            
            // 激活选中的标签
            event.target.classList.add('active');
            
            // 加载对应数据
            if (tabName === 'tasks') {
                loadKanbanBoard();
            } else if (tabName === 'performance') {
                loadPerformanceCharts();
            } else if (tabName === 'logs') {
                loadLogStream();
            }
        }
        
        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const data = await response.json();
                
                document.getElementById('total-channels').textContent = data.stats.total_channels;
                document.getElementById('total-threads').textContent = data.stats.total_threads;
                document.getElementById('running-agents').textContent = data.stats.running_agents;
                document.getElementById('total-agents').textContent = data.stats.total_agents;
                document.getElementById('pending-tasks').textContent = data.stats.pending_tasks || 0;
                document.getElementById('completed-tasks').textContent = data.stats.completed_tasks || 0;
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }
        
        // 加载 Agent 状态
        async function loadAgents() {
            try {
                const response = await fetch(`${API_BASE}/agents`);
                const data = await response.json();
                
                const agentsDiv = document.getElementById('agents');
                
                if (data.agents.length === 0) {
                    agentsDiv.innerHTML = '<div class="loading">暂无 Agent</div>';
                    return;
                }
                
                agentsDiv.innerHTML = data.agents.map(agent => `
                    <div class="agent-card">
                        <div class="agent-id">${agent.agent_id}</div>
                        <div class="agent-info">
                            <span class="state ${agent.state}">${agent.state}</span>
                            <span>驱动: ${agent.driver_type}</span>
                            <span>消息队列: ${agent.message_queue_size}</span>
                        </div>
                        <div class="metrics">
                            <div>启动时间: ${agent.uptime || 'N/A'}</div>
                            <div>最后活动: ${agent.last_activity || 'N/A'}</div>
                            <div>重启次数: ${agent.restart_count || 0}</div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('加载 Agent 状态失败:', error);
                document.getElementById('agents').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 加载任务看板（新增）
        async function loadKanbanBoard() {
            try {
                const response = await fetch(`${API_BASE}/tasks`);
                const data = await response.json();
                
                const kanbanDiv = document.getElementById('kanban-board');
                
                const columns = {
                    pending: { title: '待处理', tasks: [] },
                    in_progress: { title: '进行中', tasks: [] },
                    completed: { title: '已完成', tasks: [] }
                };
                
                data.tasks.forEach(task => {
                    if (columns[task.status]) {
                        columns[task.status].tasks.push(task);
                    }
                });
                
                kanbanDiv.innerHTML = Object.entries(columns).map(([status, column]) => `
                    <div class="kanban-column">
                        <h3>${column.title} (${column.tasks.length})</h3>
                        ${column.tasks.map(task => `
                            <div class="kanban-card">
                                <div class="title">${task.title}</div>
                                <div class="priority ${task.priority}">${task.priority}</div>
                                <div style="font-size: 0.9em; color: #888; margin-top: 5px;">
                                    ${task.description.substring(0, 50)}...
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('加载任务看板失败:', error);
                document.getElementById('kanban-board').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 加载性能图表（新增）
        async function loadPerformanceCharts() {
            try {
                const response = await fetch(`${API_BASE}/performance`);
                const data = await response.json();
                
                // 启动时间图表
                const spawnChartDiv = document.getElementById('spawn-time-chart');
                spawnChartDiv.innerHTML = data.performance.map(item => `
                    <div class="chart-bar">
                        <div class="label">${item.agent_id}</div>
                        <div class="bar">
                            <div class="bar-fill" style="width: ${Math.min(item.avg_spawn_time * 20, 100)}%"></div>
                        </div>
                        <div class="value">${item.avg_spawn_time.toFixed(3)}s</div>
                    </div>
                `).join('');
                
                // 重启次数图表
                const restartChartDiv = document.getElementById('restart-chart');
                restartChartDiv.innerHTML = data.performance.map(item => `
                    <div class="chart-bar">
                        <div class="label">${item.agent_id}</div>
                        <div class="bar">
                            <div class="bar-fill" style="width: ${Math.min(item.restart_count * 10, 100)}%"></div>
                        </div>
                        <div class="value">${item.restart_count}</div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('加载性能图表失败:', error);
                document.getElementById('spawn-time-chart').innerHTML = '<div class="loading">加载失败</div>';
                document.getElementById('restart-chart').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 加载实时日志（新增）
        async function loadLogStream() {
            try {
                const response = await fetch(`${API_BASE}/logs?limit=50`);
                const data = await response.json();
                
                const logStreamDiv = document.getElementById('log-stream');
                
                logStreamDiv.innerHTML = data.logs.map(log => `
                    <div class="log-entry">
                        <span class="timestamp">${log.timestamp}</span>
                        <span class="level ${log.level}">${log.level}</span>
                        <span class="message">${log.message}</span>
                    </div>
                `).join('');
                
                // 自动滚动到底部
                logStreamDiv.scrollTop = logStreamDiv.scrollHeight;
                
            } catch (error) {
                console.error('加载日志失败:', error);
                document.getElementById('log-stream').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 刷新数据
        async function refreshData() {
            await loadStats();
            await loadAgents();
            
            // 根据当前激活的标签页加载对应数据
            const activeTab = document.querySelector('.tab.active');
            if (activeTab) {
                const tabName = activeTab.textContent.trim();
                if (tabName === '任务看板') {
                    await loadKanbanBoard();
                } else if (tabName === '性能监控') {
                    await loadPerformanceCharts();
                } else if (tabName === '实时日志') {
                    await loadLogStream();
                }
            }
        }
        
        // 初始加载
        refreshData();
        
        // 每 10 秒自动刷新
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
