# crontab 配置 - 终极自主进化系统 v5.4.1
# 优化版定时任务

# ==================== PAI 系统 ====================
# 每 6 小时自动运行 PAI 系统
0 */6 * * * bash /root/.openclaw/workspace/scripts/pai-auto-exec.sh >> /root/.openclaw/workspace/.pai-learning/cron.log 2>&1

# ==================== 定时任务 ====================
# 每日早 8 点新闻摘要
0 8 * * * bash /root/.openclaw/workspace/scripts/daily-news-summary.sh >> /root/.openclaw/workspace/logs/news-summary.log 2>&1

# 每日晚 8 点新闻摘要
0 20 * * * bash /root/.openclaw/workspace/scripts/daily-news-summary.sh >> /root/.openclaw/workspace/logs/news-summary.log 2>&1

# 每日晚 8:30 每日简报
0 20 * * * sleep 1800 && bash /root/.openclaw/workspace/scripts/daily-digest.sh >> /root/.openclaw/workspace/logs/daily-digest.log 2>&1

# ==================== 系统优化 ====================
# 每日凌晨 2 点检查和清理日志
0 2 * * * bash /root/.openclaw/workspace/scripts/scheduled-tasks-optimizer.sh check >> /root/.openclaw/workspace/logs/optimizer.log 2>&1

# 每周日凌晨 3 点性能报告
0 3 * * 0 bash /root/.openclaw/workspace/scripts/scheduled-tasks-optimizer.sh report >> /root/.openclaw/workspace/logs/optimizer.log 2>&1

# ==================== 心跳进化 ====================
# 每次心跳时自动执行（通过 HEARTBEAT.md 配置）
# 0,30 * * * * bash /root/.openclaw/workspace/scripts/heartbeat-evolution.sh >> /root/.openclaw/workspace/logs/heartbeat.log 2>&1
