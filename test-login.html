<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIProxyAPI 登录测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #f5f5f5;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>CLIProxyAPI Web管理界面登录</h1>
    
    <div class="form-group">
        <label for="serverUrl">服务器地址:</label>
        <input type="text" id="serverUrl" value="http://43.134.63.176:8317" />
    </div>
    
    <div class="form-group">
        <label for="managementKey">管理密钥:</label>
        <input type="password" id="managementKey" value="CC123456" />
    </div>
    
    <button onclick="testLogin()">测试登录</button>
    
    <div id="result"></div>
    
    <script>
        async function testLogin() {
            const serverUrl = document.getElementById('serverUrl').value;
            const managementKey = document.getElementById('managementKey').value;
            const resultDiv = document.getElementById('result');
            
            try {
                // 测试获取配置
                const response = await fetch(`${serverUrl}/v0/management/config`, {
                    method: 'GET',
                    headers: {
                        'X-Management-Key': managementKey
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<div class="success">✅ 登录成功！</div>
                        <h3>服务器配置:</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                        <p><a href="${serverUrl}/management.html" target="_blank">点击打开Web管理界面</a></p>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ 登录失败: ${response.status} ${response.statusText}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ 错误: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
